C;height:4px"></div><div style="background-color:#DB2B39;height:5px"></div><div style="background-color:#3066BE;height:6px"></div><div style="background-color:#00A878;height:7px"></div><div style="background-color:#3066BE;height:8px"></div><div style="background-color:#00A878;height:9px"></div><div style="background-color:#3066BE;height:10px"></div><div style="background-color:#00A878;height:11px"></div></div><div class="absolute"><h1 class="text-4xl md:text-7xl lg:text-8xl font-bold tracking-tighter leading-tight md:leading-none mb-12 md:text-right md:pr-8">experiments with text</h1></div><div class="opacity-0"><h1 class="text-4xl md:text-7xl lg:text-8xl font-bold tracking-tighter leading-tight md:leading-none mb-12 md:text-right md:pr-8">experiments with text</h1></div></a><a class="flex justify-start relative" href="/projects/where%20is%20my%20body%20old"><div class="flex flex-col justify-end container absolute bottom-0"><div style="background-color:#DB2B39;height:0px"></div><div style="background-color:#DB2B39;height:1px"></div><div style="background-color:#79ADDC;height:2px"></div><div style="background-color:#DB2B39;height:3px"></div><div style="background-color:#79ADDC;height:4px"></div><div style="background-color:#DB2B39;height:5px"></div><div style="background-color:#3066BE;height:6px"></div><div style="background-color:#00A878;height:7px"></div><div style="background-color:#3066BE;height:8px"></div><div style="background-color:#00A878;height:9px"></div><div style="background-color:#3066BE;height:10px"></div><div style="background-color:#00A878;height:11px"></div></div><div class="absolute"><h1 class="text-4xl md:text-7xl lg:text-8xl font-bold tracking-tighter leading-tight md:leading-none mb-12 md:text-right md:pr-8"></h1></div><div class="opacity-0"><h1 class="text-4xl md:text-7xl lg:text-8xl font-bold tracking-tighter leading-tight md:leading-none mb-12 md:text-right md:pr-8"></h1></div></a><a class="flex justify-start relative" href="/projects/where%20is%20my%20body"><div class="flex flex-col justify-end container absolute bottom-0"><div style="background-color:#DB2B39;height:0px"></div><div style="background-color:#DB2B39;height:1px"></div><div style="background-color:#79ADDC;height:2px"></div><div style="background-color:#DB2B39;height:3px"></div><div style="background-color:#79ADDC;height:4px"></div><div style="background-color:#DB2B39;height:5px"></div><div style="background-color:#3066BE;height:6px"></div><div style="background-color:#00A878;height:7px"></div><div style="background-color:#3066BE;height:8px"></div><div style="background-color:#00A878;height:9px"></div><div style="background-color:#3066BE;height:10px"></div><div style="background-color:#00A878;height:11px"></div></div><div class="absolute"><h1 class="text-4xl md:text-7xl lg:text-8xl font-bold tracking-tighter leading-tight md:leading-none mb-12 md:text-right md:pr-8">where is my body</h1></div><div class="opacity-0"><h1 class="text-4xl md:text-7xl lg:text-8xl font-bold tracking-tighter leading-tight md:leading-none mb-12 md:text-right md:pr-8">where is my body</h1></div></a></div></div></main></div></section></div><script id="__NEXT_DATA__" type="application/json">{"props":{"pageProps":{"allProjects":[{"slug":"36 days of type 2021","content":""},{"slug":"experiments with text","title":"experiments with text","content":"\n  \n\nBesides many other things, [dra.ft](https://dra-ft.site/) is a collaborative space and community of artists, designers, technologists who explore and experiment with text and electronic literature.\n\n  \n\nIn 2021, during the pandemic and the lockdowns, I became part of it for the [freefall future.text](https://docs.google.com/spreadsheets/d/1Uvt-RmdSVGIWz9FnhRDMFBSkPYpxP5oofYclxsoRs_k/edit?pli=1#gid=1118811960) exhibition. This was the time when I had just started to think of myself as an artist and someone creative. For better or for worse, I don't think I paid much attention to the fact that this was a real exhibition. I thought of myself more as a developer and someone who was there to help other artists with their projects. I did not think that I would have any of my own ideas, and whatever ideas I had seemed like toy ideas to me.\n\n  \n\nI don't remember a lot of the conversations that we had on Gathertown (because I do have quite a shitty memory) but what I do remember is people having faith in me and making me feel at ease and like I belong. I am forever grateful for that.\n\n  \n\n# d3(x)radia(x)rekhta\n\n\u003c!-- *you can tell that the project name is thought out haha* --\u003e\n\n  \n\n*[project link](https://d3-x-radia-x-rekhta.onrender.com/)*\n\n  \n\n\u003e This project is an experiment with ways of arranging and reading text. Does text always have to flow in horizontal lines which are wrapped below each other? We tried to explore different ways of connecting words to each other, in order to look for non linear ways of reading and interpreting.\n\n\u003e - from the exhibition website\n\n  \n\nOne of the beginnings of the thought process, was a sketch I made right after #genuary2021 when I had started exploring [d3](https://d3js.org/). During this time, my practice included sketching on p5js regularly. And so I would think about an idea for a sketch during the day, when taking breaks from work, during lunch and afterwards. In the evenings, I would sit down for a few hours to sketch in code.\n\n  \n\nI remember how this one came about. I was typing something in a search box and looked at the suggestions that were coming below. This was definitely not the first time that I was seeing this pattern, but suddenly it made sense to put this inside a graph in d3.\n\n  \n\n![screenshot of google](/assets/projects/freefall/screenshot.png)\n\n  \n\nThe relationships between the words and the sentences fitted well into the structure of a connected graph. By giving each word a weight based on how well connected it is, I could make a force directed graph that could then sit on a screen like a woobly toy responding to mouse interactions. During one of the conversations with Ambika, Agat and Nanditi, we realized that this was something we wanted to explore further for dra.ft. And so Agat and I started working on it together.\n\n  \n\n\u003cvideo src='/assets/projects/freefall/d3-chai.mp4' controls\u003e\u003c/video\u003e\n\n  \n\n## Pad.ma\n\n  \n\nNow that we had a structure, the next step was to figure out what we would put inside it. Ambika had previously worked with [pad.ma](https://pad.ma/) , contributing to making transcripts for some of the archival materials; and when I first saw it, I was immediately in love. I could not fathom how something like it could exist; I don't think I still do. Everytime I interacted with it, while just browsing, or later when trying to use their APIs, it made me think of how software can be beautiful, and wonder how it can exist outside capitalist boundaries of profit making.\n\n  \n\n![screenshot of pad.ma website](/assets/projects/freefall/padma-screenshot.jpg)\n\n  \n\nWe found [The Radia Tapes](https://pad.ma/grid/created/radia_tapes) through pad.ma, and thought it was quite interesting and funny at times, and we loved listening to it during the calls. The transcript is available as a [pdf](https://studio.camp/radiaSRT/print/out.pdf) online, maintained by the folks at [studio camp.](https://studio.camp/)\n\n  \n\n## Rekhta\n\n  \n\nAfter getting some results with pad.ma, the next challenge was to explore using the same process and technologies with a non-Latin source, and sharing a love for Urdu poetry we decided upon [Rekhta,](https://rekhta.org) a much loved corner of the internet for Hindi and Urdu readers. It was interesting to note here that by using some translation for filtering, we could use the same process.\n\n  \n\n![Process diagram for the three different sources](/assets/projects/freefall/d3-x-radia-x-rekhta.drawio.png)\n\n  \n  \n\nHere are some poems / images that came out.\n\n  \n\n![poem 1](/assets/projects/freefall/poem1.png)\n\n  \n\n![poem 2](/assets/projects/freefall/poem2.png)\n\n  \n\n![poem 3](/assets/projects/freefall/poem3.png)\n\n  \n\n![poem 4](/assets/projects/freefall/poem.png)\n\n  \n\n---\n\n# supercut(x)pad.ma\n\n\u003c!-- *there is a pattern to my sad naming scheme here* --\u003e\n\n  \n\n*[project link](https://github.com/dra-ft/supercut-x-padma)*\n\n  \n\n![cut 1](/assets/projects/freefall/cut1.png)\n\n  \n\nI really like Pad.ma's interface and the affordances it offers to be able to find and view the archives in multiple different ways. The size of the search bar in the top right is also interesting. Unlike Google search which lets you look at multiple lines of a query at the same time, it is tinier and you can only see a few words of your query at a time. Naturally, I had been using it with search terms not bigger than two or three words. And it would give me a collection of clips with different people talking about the same / similar things.\n\n  \n\n\u003e This project is an attempt at constructing stories. Inspired by the idea that a singular object or idea can invoke wildly different feelings and thoughts for different people. Would it be interesting to define something by the stories that people tell about it, by the context it lives in, by the company it keeps.\n\n\u003e - from the exhibition website\n\n  \n\nThrough the text labs and conversations, I got introduced to the idea of a supercut, [ffmpeg](https://ffmpeg.org/) and a project by Sam Lavigne called [Videogrep.](https://lav.io/projects/videogrep/) And since I was now getting more familiar with the API, I started thinking of stitching together the original video footage by using the transcripts.\n\n  \n\nI ended up making a command line program that creates a supercut from a query string and Pad.ma's archival material, even though it isn't the most interactive and accessible[^1].\n\n  \n\nHere are some cuts I made right after.\n\n  \n\n\u003ciframe width=\"100%\" height=\"315\" src=\"https://www.youtube.com/embed/1wb4IkFdbUk?si=nKNLgPjMfsu6_N3X\" title=\"YouTube video player\" frameborder=\"0\" allow=\"accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share\" allowfullscreen\u003e\u003c/iframe\u003e\n\n\n\n\u003ciframe width=\"100%\" height=\"315\" src=\"https://www.youtube.com/embed/px4tnAfKfa4?si=2sDBKz71ID5cOwT_\" title=\"YouTube video player\" frameborder=\"0\" allow=\"accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share\" allowfullscreen\u003e\u003c/iframe\u003e\n\n  \n  \n\nThis was a partial end of the explorations we did, and it was super fun!\n\n  \n\nLove and hugs for Ambika, Nanditi and Agat.\n\n  \n\nThank you for calling me to draft at dra.ft \u003c3\n\n  \n\n### References\n\n- [First open lab day | early experiments, Youtube Stream](https://www.youtube.com/watch?v=_Z0LT3EozQ4)\n\n- [d3(x)radia(x)rekhta | source code](https://github.com/dra-ft/d3-radia-rekhta/)\n\n- [supercut(x)padma | source code](https://github.com/dra-ft/supercut-x-padma)\n\n  \n  \n\n[^1]: I am currently working on transforming the command line tool into a website.","year":2021},{"slug":"where is my body old","content":"\n\u003e Ghias, we must be careful not to teach the girls too much. How will they ever find husbands if they are too learned? The less they know, the less they will want of the outside world.\n\n\u003e When is abortion legal? If continuing the pregnancy involves a risk to the mother's life. Continuing pregnancy would cause grave damage to the physical or mental health of the mother. The pregnancy has been caused by rape. If the child is born, it would be gravely deformed. Any method of family planning adopted by the couple has failed.\n\n\u003e Every woman knows that, regardless of all her other achievements, she is a failure if she is not beautiful.\n\ni like to collect sentences. it is one of the best things about owning a kindle; you can highlight! i do have a wip project ([[my readwise]]) to be able to go back to these kindle highlights. \n\nthe randomness of these collections of sentences is fascinating. because it is not quite random but the associations can be wild and new ones form each time you go through it again. i'm sure that i will not highlight the same things when reading something for the second time.  \n\nit was with this fascination that i started working on wimb. i don't quite recall why i chose the body as a site to start this collection, this archive of thoughts. but the process has been very interesting. i have read a lot, i have marked a lot, i have thought about my body a lot. \n\nduring a short flirtation with blender, i remember thinking about making a building with rooms that represent parts of my body. (*maybe i can find the handwritten notes somewhere*) and the digital part of the project developed for serendipity is a combination of the same ideas. you see a bunch of doors and entering them presents you with a series of choices where you pick sentences from the archive, creating your own personal archive of choices. to be honest, both these archives are not rigorous at all. they are temporary sites of data collection with the latter not existing anywhere outside of your memory and experience. they are casual. they are destroyed and are built again. but just like going through your highlights brings back something, these sentences act as inviting hooks into the original material; material that speaks through many voices about the same subject that is the human body. \n\nfor the physical leg of the project i experimented with an arduino and raspberry pi setup for the first time (physical computing is fun but oh so anxiety inducing). i wanted for people to be able to engage with the archive in a more immediate manner and landed on the idea of a typewriter as a mouthpiece for the archive. \n"},{"slug":"where is my body","title":"where is my body","content":"\n  \n  \n\nI read extremely normal amounts. I know people who read much more and have much stronger memory, and those are abilities I would definitely choose to have if I could. Hearing people recite *shers* from memory gives me both extreme pleasure and a dull pain.\n\n  \n\nBut since I do have really shitty memory - as you would know annoyingly, if you know me personally - it becomes important to organise some sort of a personal archive. And this is not just because of bad memory; we all build these archives in some way or another, with our screenshots folder or browser history. We collect links and pin things and bookmark; all in the hope of someday being a version of ourselves that will actually go through the contents of this ever growing list. In a lot of ways this kind of collecting is like putting things in a void or in the garbage can; you know that you are never actually going to see them again.\n\n  \n\nBuilding a personal archive is a different exercise. I like to think of it as building a home to which you can return when you're lost and struggling to find yourself. Not in any dramatic way, but everyday ways like when you get stared at on the street and now in the back of your head there is a lingering thought that there might be something wrong with how your dressed, or how you look. In fact most of the times, I did not even need to be stared at to be reminded of this feeling of being a stranger inside my own body. There was relief to be found among the many texts I was reading, and since the initial idea of building a twitter stream of things people were saying about bodies was turning out to be quite depressing, I turned towards the manual approach and told the software engineer inside me to shut up for just one second.\n\n  \n\nI read and read (still very normal amounts) and made a [spreadsheet](https://docs.google.com/spreadsheets/d/1JQj7LOJGX4-OtiAO9XfzMXzjNKiW37sA4AQQ-gNmBtQ/edit?usp=sharing) which turned into a [notion database](https://trivedianushka.notion.site/525f09a8c0ed4dcb9ca5765989fd26dd?v=759c0ff359ae4d1d99940c09da5e14d2\u0026pvs=4) [^1] which turned into a [twitter account](https://twitter.com/whereisourbody) and a [very tiny game](https://futurelanding.serendipityartsvirtual.com/opheliagame) [^2] where you pick items from this collection based on phrases and words and decide yourself whether you thought you won or not based on the items that you picked.\n\n  \n\n[play here](https://futurelanding.serendipityartsvirtual.com/opheliagame)\n\n  \n\n![screenshot from future landing](/assets/projects/wimb/futurelanding.serendipityartsvirtual.com_opheliagame.png)\n\n  \n  \n\n![screenshsot from future landing of the game end](/assets/projects/wimb/result.png)\n\n  \n\n## let's get physical\n\n  \n\nAnd then Future Landing became physical and we descended upon a very lovely building, the Excise Building in Goa, and where is my body was to have a separate room for itself. Maybe because so many things were a first for me with this one, I decided on a somewhat [^3] ambitious idea of making a typewriter that hosts the archive and also acts as its' mouthpiece.\n\n  \n\n![screenshot from notion of the process of thinking about physical iteration of WIMB](/assets/projects/wimb/notion-screenshot.png)\n\n  \n\nSo you would say something, i.e. type something on the typewriter and see it on paper in front of you of course; and then the typewriter would respond to you from the archive. This back and forth could continue until you ran out of paper or patience at which point you could do as you wished with the paper sheets; take them back or leave them there for other people to read.\n\n  \n\n![picture showing type writer at SAF 2022](/assets/projects/wimb/wimb1.jpg)\n\n  \n\n![where is my body at SAF 2022](/assets/projects/wimb/wimb2.jpg)\n\n  \n\n![where is my body at SAF 2022](/assets/projects/wimb/wimb3.jpg)\n\n  \n  \n  \n  \n\n[^1]: what is up with the title field of notion databases, like honestly not everything has a title notion!\n\n[^2]: very tiny \"game\"\n\n[^3]: very much, I did not even own an Arduino at this point","year":2022}]},"__N_SSG":true},"page":"/projects","query":{},"buildId":"t3vY9qJ_l9NYv7fUdl6zS","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
